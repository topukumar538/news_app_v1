<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feedback — NewsWire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue:   #4285F4;
            --red:    #EA4335;
            --yellow: #FBBC05;
            --green:  #34A853;
            --dark:   #202124;
            --gray:   #5F6368;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            background:
                radial-gradient(ellipse at 10% 20%, rgba(66,133,244,0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 90% 10%, rgba(234,67,53,0.14) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 85%, rgba(52,168,83,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 90%, rgba(251,188,5,0.14) 0%, transparent 50%),
                #eef2ff;
            color: var(--dark);
        }

        nav {
            padding: 14px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 2px 12px rgba(66,133,244,0.07);
        }

        .logo {
            font-family: 'Nunito', sans-serif;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-decoration: none;
        }
        .logo .n  { color: var(--blue); }
        .logo .e  { color: var(--red); }
        .logo .w  { color: var(--yellow); }
        .logo .s  { color: var(--blue); }
        .logo .w2 { color: var(--green); }
        .logo .i  { color: var(--red); }
        .logo .r  { color: var(--yellow); }
        .logo .e2 { color: var(--blue); }

        .nav-right { display: flex; align-items: center; gap: 12px; }

        .btn-back {
            font-size: 13px;
            color: var(--gray);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.8);
            transition: all 0.18s;
            backdrop-filter: blur(8px);
        }
        .btn-back:hover { background: rgba(255,255,255,0.8); color: var(--dark); }

        .btn-logout {
            font-size: 13px;
            color: var(--red);
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(234,67,53,0.07);
            border: 1px solid rgba(234,67,53,0.2);
            cursor: pointer;
            transition: all 0.18s;
            font-family: 'Roboto', sans-serif;
        }
        .btn-logout:hover { background: rgba(234,67,53,0.14); }

        .page-wrap {
            max-width: 520px;
            margin: 40px auto;
            padding: 0 20px 80px;
        }

        .glass-card {
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 28px;
            padding: 44px 40px;
            box-shadow: 0 8px 32px rgba(66,133,244,0.09), 0 2px 8px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.95);
            animation: slideUp 0.6s ease forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-header { text-align: center; margin-bottom: 32px; }

        .icon-wrap {
            width: 72px; height: 72px;
            border-radius: 20px;
            background: rgba(66,133,244,0.1);
            border: 1px solid rgba(66,133,244,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
            margin: 0 auto 20px;
            backdrop-filter: blur(8px);
        }

        .dot-row {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 18px;
        }
        .dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        }

        .card-title {
            font-family: 'Nunito', sans-serif;
            font-size: 26px;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .card-sub { font-size: 14px; color: var(--gray); font-weight: 300; }

        .alert {
            padding: 11px 14px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }
        .alert-error   { background: rgba(234,67,53,0.08); border: 1px solid rgba(234,67,53,0.25); color: var(--red); }
        .alert-success { background: rgba(52,168,83,0.08);  border: 1px solid rgba(52,168,83,0.25); color: var(--green); }

        .field-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--dark);
            margin-bottom: 12px;
        }
        .stars-wrap {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 10px;
        }
        .star {
            font-size: 36px;
            cursor: pointer;
            color: #d1d5db;
            transition: transform 0.15s, color 0.15s;
            line-height: 1;
            user-select: none;
        }
        .star:hover, .star.active { color: var(--yellow); transform: scale(1.2); }
        .rating-text {
            text-align: center;
            font-size: 13px;
            color: var(--gray);
            font-weight: 300;
            margin-bottom: 24px;
            min-height: 20px;
        }

        .field-wrap { margin-bottom: 22px; }
        .textarea-field {
            width: 100%;
            background: rgba(255,255,255,0.7);
            border: 1.5px solid rgba(255,255,255,0.9);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            font-family: 'Roboto', sans-serif;
            color: var(--dark);
            resize: none;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05), inset 0 1px 2px rgba(255,255,255,0.8);
            backdrop-filter: blur(8px);
        }
        .textarea-field::placeholder { color: #aab0bb; }
        .textarea-field:focus {
            border-color: rgba(66,133,244,0.5);
            background: rgba(255,255,255,0.9);
            box-shadow: 0 0 0 3px rgba(66,133,244,0.12), 0 1px 4px rgba(0,0,0,0.05);
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--blue) 0%, #6aa3f8 100%);
            color: white;
            padding: 13px;
            border-radius: 14px;
            font-weight: 500;
            font-size: 15px;
            border: 1px solid rgba(255,255,255,0.25);
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Roboto', sans-serif;
            box-shadow: 0 3px 12px rgba(66,133,244,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
            letter-spacing: 0.3px;
        }
        .btn-primary:hover { box-shadow: 0 6px 20px rgba(66,133,244,0.45); transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

        @media (max-width: 600px) {
            nav { padding: 12px 20px; }
            .glass-card { padding: 30px 22px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/app/news.html" class="logo">
            <span class="n">N</span><span class="e">e</span><span class="w">w</span><span class="s">s</span><span class="w2">W</span><span class="i">i</span><span class="r">r</span><span class="e2">e</span>
        </a>
        <div class="nav-right">
            <!-- FIX: was /app/news.html which doesn't exist -->
            <a href="/app/news.html" class="btn-back">← Back to Feed</a>
            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
    </nav>

    <div class="page-wrap">
        <div class="glass-card">

            <div class="card-header">
                <div class="dot-row">
                    <div class="dot" style="background:var(--blue)"></div>
                    <div class="dot" style="background:var(--red)"></div>
                    <div class="dot" style="background:var(--yellow)"></div>
                    <div class="dot" style="background:var(--green)"></div>
                </div>
                <div class="icon-wrap">💬</div>
                <div class="card-title">Send Feedback</div>
                <p class="card-sub">Help us improve NewsWire</p>
            </div>

            <div id="error" class="alert alert-error"></div>
            <div id="success" class="alert alert-success"></div>

            <div class="field-wrap">
                <label class="field-label">Rating</label>
                <div class="stars-wrap" id="stars">
                    <span class="star" onclick="setRating(1)">★</span>
                    <span class="star" onclick="setRating(2)">★</span>
                    <span class="star" onclick="setRating(3)">★</span>
                    <span class="star" onclick="setRating(4)">★</span>
                    <span class="star" onclick="setRating(5)">★</span>
                </div>
                <p id="rating-text" class="rating-text">Click to rate</p>
            </div>

            <div class="field-wrap">
                <label class="field-label">Message</label>
                <textarea id="message" rows="4" placeholder="Tell us what you think..." class="textarea-field"></textarea>
            </div>

            <button onclick="submitFeedback()" id="btn" class="btn-primary">Submit Feedback</button>
        </div>
    </div>

    <script>
        let selectedRating = 0

        const ratingLabels = {
            1: "Poor ⭐",
            2: "Fair ⭐⭐",
            3: "Good ⭐⭐⭐",
            4: "Very Good ⭐⭐⭐⭐",
            5: "Excellent ⭐⭐⭐⭐⭐"
        }

        function setRating(rating) {
            selectedRating = rating
            document.querySelectorAll(".star").forEach((star, i) => {
                star.classList.toggle("active", i < rating)
            })
            document.getElementById("rating-text").textContent = ratingLabels[rating]
        }

        function showError(msg) {
            const el = document.getElementById("error")
            el.textContent = msg; el.style.display = "block"
            document.getElementById("success").style.display = "none"
        }
        function showSuccess(msg) {
            const el = document.getElementById("success")
            el.textContent = msg; el.style.display = "block"
            document.getElementById("error").style.display = "none"
        }

        async function submitFeedback() {
            const message = document.getElementById("message").value.trim()
            if (selectedRating === 0) return showError("Please select a rating")
            if (!message) return showError("Please write a message")

            const btn = document.getElementById("btn")
            btn.textContent = "Submitting..."; btn.disabled = true

            try {
                const res = await fetch("/user/feedback", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify({ message, rating: selectedRating })
                })
                const data = await res.json()
                if (res.ok) {
                    showSuccess("Thank you for your feedback!")
                    document.getElementById("message").value = ""
                    selectedRating = 0
                    document.querySelectorAll(".star").forEach(s => s.classList.remove("active"))
                    document.getElementById("rating-text").textContent = "Click to rate"
                } else {
                    showError(data.detail)
                }
            } finally {
                btn.textContent = "Submit Feedback"; btn.disabled = false
            }
        }

        async function logout() {
            await fetch("/auth/logout", { method: "POST", credentials: "include" })
            window.location.href = "/app/index.html"
        }
    </script>
</body>
</html>
