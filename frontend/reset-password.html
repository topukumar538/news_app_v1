<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password — NewsWire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue:   #4285F4;
            --red:    #EA4335;
            --yellow: #FBBC05;
            --green:  #34A853;
            --dark:   #202124;
            --gray:   #5F6368;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background:
                radial-gradient(ellipse at 10% 20%, rgba(66,133,244,0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 90% 10%, rgba(234,67,53,0.14) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 85%, rgba(52,168,83,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 90%, rgba(251,188,5,0.14) 0%, transparent 50%),
                #eef2ff;
            color: var(--dark);
        }

        .form-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 28px;
            padding: 48px 40px;
            box-shadow: 0 8px 32px rgba(66,133,244,0.1), 0 2px 8px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.95);
            animation: slideUp 0.6s ease forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .dot-row {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 22px;
        }
        .dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        }

        .icon-wrap {
            width: 72px; height: 72px;
            border-radius: 20px;
            background: rgba(52,168,83,0.1);
            border: 1px solid rgba(52,168,83,0.25);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
            margin: 0 auto 22px;
            backdrop-filter: blur(8px);
        }

        .form-title {
            font-family: 'Nunito', sans-serif;
            font-size: 26px;
            font-weight: 800;
            color: var(--dark);
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .form-sub {
            font-size: 14px;
            color: var(--gray);
            font-weight: 300;
            text-align: center;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        .form-sub span { color: var(--blue); font-weight: 500; }

        /* ALERTS */
        .alert {
            padding: 11px 14px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 18px;
            display: none;
        }
        .alert-error   { background: rgba(234,67,53,0.08); border: 1px solid rgba(234,67,53,0.25); color: var(--red); }
        .alert-success { background: rgba(52,168,83,0.08);  border: 1px solid rgba(52,168,83,0.25); color: var(--green); }

        /* INPUTS */
        .field-wrap { margin-bottom: 18px; }
        .field-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--dark);
            margin-bottom: 7px;
        }
        .input-field {
            width: 100%;
            background: rgba(255,255,255,0.7);
            border: 1.5px solid rgba(255,255,255,0.9);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            font-family: 'Roboto', sans-serif;
            color: var(--dark);
            box-shadow: 0 1px 4px rgba(0,0,0,0.05), inset 0 1px 2px rgba(255,255,255,0.8);
            backdrop-filter: blur(8px);
        }
        .input-field::placeholder { color: #aab0bb; }
        .input-field:focus {
            border-color: rgba(66,133,244,0.5);
            background: rgba(255,255,255,0.9);
            box-shadow: 0 0 0 3px rgba(66,133,244,0.12), 0 1px 4px rgba(0,0,0,0.05);
        }
        .input-field.otp-input {
            text-align: center;
            font-size: 26px;
            letter-spacing: 12px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
        }
        .input-field.otp-input::placeholder { letter-spacing: 8px; font-size: 18px; }

        /* BUTTON */
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--blue) 0%, #6aa3f8 100%);
            color: white;
            padding: 13px;
            border-radius: 14px;
            font-weight: 500;
            font-size: 15px;
            border: 1px solid rgba(255,255,255,0.25);
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Roboto', sans-serif;
            box-shadow: 0 3px 12px rgba(66,133,244,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
            letter-spacing: 0.3px;
            margin-bottom: 20px;
        }
        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(66,133,244,0.45);
            transform: translateY(-1px);
        }
        .btn-primary:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

        .footer-links {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        .footer-links a {
            color: var(--blue);
            text-decoration: none;
            font-weight: 500;
        }
        .footer-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="form-card">

        <div class="dot-row">
            <div class="dot" style="background:var(--blue)"></div>
            <div class="dot" style="background:var(--red)"></div>
            <div class="dot" style="background:var(--yellow)"></div>
            <div class="dot" style="background:var(--green)"></div>
        </div>

        <div class="icon-wrap">🔒</div>

        <div class="form-title">Reset Password</div>
        <p class="form-sub">Enter the code sent to <span id="email-display"></span></p>

        <div id="error" class="alert alert-error"></div>
        <div id="success" class="alert alert-success"></div>

        <div class="field-wrap">
            <label class="field-label">OTP Code</label>
            <input id="code" type="text" placeholder="000000" maxlength="6"
                class="input-field otp-input"
                onkeydown="if(event.key==='Enter') document.getElementById('new-password').focus()"/>
        </div>
        <div class="field-wrap">
            <label class="field-label">New Password</label>
            <input id="new-password" type="password" placeholder="Min 6 characters"
                class="input-field"
                onkeydown="if(event.key==='Enter') document.getElementById('confirm-password').focus()"/>
        </div>
        <div class="field-wrap">
            <label class="field-label">Confirm Password</label>
            <input id="confirm-password" type="password" placeholder="Repeat new password"
                class="input-field"
                onkeydown="if(event.key==='Enter') resetPassword()"/>
        </div>

        <button onclick="resetPassword()" id="btn" class="btn-primary">Reset Password</button>

        <div class="footer-links">
            <a href="/app/forgot-password.html">Resend code</a>
            <a href="/app/login.html">Back to login</a>
        </div>
    </div>

    <script>
        const email = localStorage.getItem("verify_email")
        if (!email) window.location.href = "/app/forgot-password.html"
        document.getElementById("email-display").textContent = email

        function showError(msg) {
            const el = document.getElementById("error")
            el.textContent = msg; el.style.display = "block"
            document.getElementById("success").style.display = "none"
        }
        function showSuccess(msg) {
            const el = document.getElementById("success")
            el.textContent = msg; el.style.display = "block"
            document.getElementById("error").style.display = "none"
        }

        async function resetPassword() {
            const code = document.getElementById("code").value.trim()
            const new_password = document.getElementById("new-password").value
            const confirm_password = document.getElementById("confirm-password").value

            if (!code || code.length !== 6) return showError("Enter a valid 6-digit code")
            if (!new_password || !confirm_password) return showError("All fields are required")
            if (new_password.length < 6) return showError("Password must be at least 6 characters")
            if (new_password !== confirm_password) return showError("Passwords do not match")

            const btn = document.getElementById("btn")
            btn.textContent = "Resetting..."; btn.disabled = true

            try {
                const res = await fetch("/auth/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify({ email, code, new_password, confirm_password })
                })
                const data = await res.json()
                if (res.ok) {
                    showSuccess("Password reset successfully! Redirecting to login...")
                    localStorage.removeItem("verify_email")
                    localStorage.removeItem("verify_purpose")
                    setTimeout(() => window.location.href = "/app/login.html", 2000)
                } else {
                    showError(data.detail)
                }
            } finally {
                btn.textContent = "Reset Password"; btn.disabled = false
            }
        }
    </script>
</body>
</html>
