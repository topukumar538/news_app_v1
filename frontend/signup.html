<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up — NewsWire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue:   #4285F4;
            --red:    #EA4335;
            --yellow: #FBBC05;
            --green:  #34A853;
            --dark:   #202124;
            --gray:   #5F6368;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            background:
                radial-gradient(ellipse at 10% 20%, rgba(66,133,244,0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 90% 10%, rgba(234,67,53,0.14) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 85%, rgba(52,168,83,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 90%, rgba(251,188,5,0.14) 0%, transparent 50%),
                #eef2ff;
            color: var(--dark);
        }
        .left-panel { display: none; flex: 1; flex-direction: column; justify-content: center; padding: 60px 64px; }
        @media (min-width: 1024px) { .left-panel { display: flex; } }
        .left-glass {
            background: rgba(255,255,255,0.35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 28px;
            padding: 52px 48px;
            box-shadow: 0 8px 32px rgba(66,133,244,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
        }
        .logo { font-family: 'Nunito', sans-serif; font-size: 30px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 36px; }
        .logo .n  { color: var(--blue); }
        .logo .e  { color: var(--red); }
        .logo .w  { color: var(--yellow); }
        .logo .s  { color: var(--blue); }
        .logo .w2 { color: var(--green); }
        .logo .i  { color: var(--red); }
        .logo .r  { color: var(--yellow); }
        .logo .e2 { color: var(--blue); }
        .left-title { font-family: 'Nunito', sans-serif; font-size: 36px; font-weight: 800; line-height: 1.2; color: var(--dark); margin-bottom: 14px; letter-spacing: -0.5px; }
        .left-sub { font-size: 15px; color: var(--gray); font-weight: 300; line-height: 1.7; margin-bottom: 36px; }
        .feature-item { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
        .feature-dot { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .fd-blue   { background: rgba(66,133,244,0.12); border: 1px solid rgba(66,133,244,0.2); }
        .fd-yellow { background: rgba(251,188,5,0.12);  border: 1px solid rgba(251,188,5,0.25); }
        .fd-green  { background: rgba(52,168,83,0.10);  border: 1px solid rgba(52,168,83,0.2); }
        .feature-text { font-size: 14px; color: var(--gray); font-weight: 400; }
        .right-panel { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
        .form-card {
            width: 100%; max-width: 420px;
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 28px;
            padding: 44px 40px;
            box-shadow: 0 8px 32px rgba(66,133,244,0.1), 0 2px 8px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.95);
            animation: slideUp 0.6s ease forwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        .dot-row { display: flex; gap: 6px; margin-bottom: 24px; }
        .dot { width: 9px; height: 9px; border-radius: 50%; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
        .form-title { font-family: 'Nunito', sans-serif; font-size: 28px; font-weight: 800; color: var(--dark); margin-bottom: 6px; letter-spacing: -0.5px; }
        .form-sub { font-size: 14px; color: var(--gray); font-weight: 300; margin-bottom: 28px; }
        .alert { padding: 11px 14px; border-radius: 12px; font-size: 13px; margin-bottom: 18px; display: none; }
        .alert-error   { background: rgba(234,67,53,0.08);  border: 1px solid rgba(234,67,53,0.25);  color: var(--red); }
        .alert-success { background: rgba(52,168,83,0.08);  border: 1px solid rgba(52,168,83,0.25);  color: var(--green); }
        .field-wrap { margin-bottom: 18px; }
        .field-label { display: block; font-size: 13px; font-weight: 500; color: var(--dark); margin-bottom: 7px; }
        .input-field {
            width: 100%;
            background: rgba(255,255,255,0.7);
            border: 1.5px solid rgba(255,255,255,0.9);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            font-family: 'Roboto', sans-serif;
            color: var(--dark);
            box-shadow: 0 1px 4px rgba(0,0,0,0.05), inset 0 1px 2px rgba(255,255,255,0.8);
            backdrop-filter: blur(8px);
        }
        .input-field::placeholder { color: #aab0bb; }
        .input-field:focus { border-color: rgba(66,133,244,0.5); background: rgba(255,255,255,0.9); box-shadow: 0 0 0 3px rgba(66,133,244,0.12), 0 1px 4px rgba(0,0,0,0.05); }
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--blue) 0%, #6aa3f8 100%);
            color: white; padding: 13px; border-radius: 14px;
            font-weight: 500; font-size: 15px;
            border: 1px solid rgba(255,255,255,0.25);
            cursor: pointer; transition: all 0.2s;
            font-family: 'Roboto', sans-serif;
            box-shadow: 0 3px 12px rgba(66,133,244,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
            letter-spacing: 0.3px; margin-top: 4px;
        }
        .btn-primary:hover { box-shadow: 0 6px 20px rgba(66,133,244,0.45); transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }
        .footer-text { text-align: center; font-size: 13px; color: var(--gray); margin-top: 22px; }
        .footer-text a { color: var(--blue); text-decoration: none; font-weight: 500; }
        .footer-text a:hover { text-decoration: underline; }
        @media (max-width: 600px) { .form-card { padding: 32px 24px; } }
    </style>
</head>
<body>
    <div class="left-panel">
        <div class="left-glass">
            <div class="logo">
                <span class="n">N</span><span class="e">e</span><span class="w">w</span><span class="s">s</span><span class="w2">W</span><span class="i">i</span><span class="r">r</span><span class="e2">e</span>
            </div>
            <div class="left-title">Join us today.</div>
            <p class="left-sub">Create your account and start discovering content tailored just for you.</p>
            <div class="feature-item">
                <div class="feature-dot fd-blue">📰</div>
                <span class="feature-text">Personalized news feed</span>
            </div>
            <div class="feature-item">
                <div class="feature-dot fd-yellow">⚡</div>
                <span class="feature-text">Real-time updates from 500+ sources</span>
            </div>
            <div class="feature-item">
                <div class="feature-dot fd-green">🔐</div>
                <span class="feature-text">Secure account with 2FA</span>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="form-card">
            <div class="dot-row">
                <div class="dot" style="background:var(--blue)"></div>
                <div class="dot" style="background:var(--red)"></div>
                <div class="dot" style="background:var(--yellow)"></div>
                <div class="dot" style="background:var(--green)"></div>
            </div>
            <div class="form-title">Create account</div>
            <p class="form-sub">Fill in your details to get started</p>
            <div id="error" class="alert alert-error"></div>
            <div id="success" class="alert alert-success"></div>
            <div class="field-wrap">
                <label class="field-label">Username</label>
                <input id="username" type="text" placeholder="Your name" class="input-field"/>
            </div>
            <div class="field-wrap">
                <label class="field-label">Email</label>
                <input id="email" type="email" placeholder="you@example.com" class="input-field"/>
            </div>
            <div class="field-wrap">
                <label class="field-label">Password</label>
                <input id="password" type="password" placeholder="Min 6 characters" class="input-field"/>
            </div>
            <button onclick="signup()" id="btn" class="btn-primary">Create Account</button>
            <p class="footer-text">Already have an account? <a href="/app/login.html">Sign in</a></p>
        </div>
    </div>

    <script>
        function showError(msg) {
            const err = document.getElementById("error"), suc = document.getElementById("success")
            err.textContent = msg; err.style.display = "block"; suc.style.display = "none"
        }
        function showSuccess(msg) {
            const err = document.getElementById("error"), suc = document.getElementById("success")
            suc.textContent = msg; suc.style.display = "block"; err.style.display = "none"
        }
        async function signup() {
            const username = document.getElementById("username").value.trim()
            const email = document.getElementById("email").value.trim()
            const password = document.getElementById("password").value
            if (!username || !email || !password) return showError("All fields are required")
            if (password.length < 6) return showError("Password must be at least 6 characters")
            const btn = document.getElementById("btn")
            btn.textContent = "Sending OTP..."; btn.disabled = true
            try {
                const res = await fetch("/auth/signup", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify({ username, email, password })
                })
                const data = await res.json()
                if (res.ok) {
                    showSuccess("OTP sent to your email!")
                    localStorage.setItem("verify_email", email)
                    localStorage.setItem("verify_purpose", "signup")
                    setTimeout(() => window.location.href = "/app/verify.html", 1500)
                } else {
                    showError(data.detail)
                }
            } finally {
                btn.textContent = "Create Account"; btn.disabled = false
            }
        }
    </script>
</body>
</html>
